# 릴리즈 — main 에서 수동 dispatch 시 다섯 플랫폼 타깃마다 사이드카 dist 아카이브를 빌드해
# owner-immutable GitHub Release 자산으로 올린다. 각 타깃은 그 타깃의 네이티브 러너에서
# 빌드한다. 엔진(libghostty-vt.a)은 pinned ghostty 소스에서 Zig 로 네이티브 빌드해 build.rs 가
# 링크한다(Zig 0.15.2 = ghostty minimum_zig_version, 커밋 a887df4 핀 = README 빌드 요구).
# 버전/태그는 소유 manifest(Cargo.toml)에서 유도한다.
name: release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: "1.96.0"
          targets: ${{ matrix.target }}
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: "0.15.2"
      - id: identity
        shell: bash
        run: |
          ver="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          case "$ver" in ''|*[!0-9.]*) echo "invalid version: $ver" >&2; exit 1;; esac
          echo "version=$ver" >> "$GITHUB_OUTPUT"
      - name: Build libghostty-vt from pinned ghostty source (Zig)
        shell: bash
        run: |
          set -euo pipefail
          git init -q _ghostty
          git -C _ghostty remote add origin https://github.com/ghostty-org/ghostty.git
          git -C _ghostty fetch -q --depth 1 origin a887df42c56f6de86c0fe6da9c4eeca37931e083
          git -C _ghostty -c advice.detachedHead=false checkout -q a887df42c56f6de86c0fe6da9c4eeca37931e083
          ( cd _ghostty && zig build -Demit-lib-vt=true -Doptimize=ReleaseFast )
          # ghostty 정적 라이브러리 이름은 플랫폼마다 다르다: Windows 는 ghostty-vt-static.lib
          # (DLL import lib 과의 충돌 회피, build.zig), 나머지는 libghostty-vt.a. build.rs 가
          # 같은 규칙으로 링크한다.
          case "${{ matrix.target }}" in
            *windows*) test -f _ghostty/zig-out/lib/ghostty-vt-static.lib ;;
            *)         test -f _ghostty/zig-out/lib/libghostty-vt.a ;;
          esac
          echo "SOKSAK_GHOSTTY_VT_LIB=$PWD/_ghostty/zig-out/lib" >> "$GITHUB_ENV"
      - name: Build and stage the release binary for this target
        shell: bash
        run: ./stage.sh dist "${{ matrix.target }}"
      - id: archive
        shell: bash
        run: |
          ver="${{ steps.identity.outputs.version }}"
          out="soksak-sidecar-terminal-ghostty-$ver-${{ matrix.target }}.tar.gz"
          tar -czf "$out" -C dist .
          # sha256 도구는 러너마다 다르다 — macOS 는 shasum(perl), linux·windows(git-bash)
          # 는 sha256sum(coreutils). 둘 다 "<hex>  <file>" 형식으로 동일하다.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$out" | tee "$out.sha256"
          else
            shasum -a 256 "$out" | tee "$out.sha256"
          fi
          echo "asset=$out" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist-${{ matrix.target }}
          path: |
            ${{ steps.archive.outputs.asset }}
            ${{ steps.archive.outputs.asset }}.sha256
          if-no-files-found: error
          compression-level: 0

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - id: identity
        run: |
          ver="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          case "$ver" in ''|*[!0-9.]*) echo "invalid version: $ver" >&2; exit 1;; esac
          echo "tag=v$ver" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: Create least-privilege release token
        id: release-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ vars.SOKSAK_RELEASE_CLIENT_ID }}
          private-key: ${{ secrets.SOKSAK_RELEASE_PRIVATE_KEY }}
          permission-administration: read
          permission-contents: write
      - name: Publish through owner-enforced immutable releases
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
        run: |
          enforced="$(gh api "repos/${{ github.repository }}/immutable-releases" --jq '.enabled and .enforced_by_owner')"
          test "$enforced" = "true" || { echo "owner-enforced immutable releases must be enabled before tagging" >&2; exit 1; }
          tag="${{ steps.identity.outputs.tag }}"
          assets="$(find dist -type f \( -name '*.tar.gz' -o -name '*.sha256' \) | sort)"
          test "$(printf '%s\n' "$assets" | grep -c '\.tar\.gz$')" -eq 5 || { echo "expected 5 platform archives, got:" >&2; echo "$assets" >&2; exit 1; }
          gh release create "$tag" --repo "${{ github.repository }}" --target "${{ github.sha }}" --title "$tag" --generate-notes $assets
